services:
  web:
    build: .
    image: paper-agent:latest
    container_name: paper-agent-web
    command: >
      paper-agent web
      --config /app/config.yaml
      --host 0.0.0.0
      --port 8000
    env_file:
      - .env
    environment:
      - PYTHONIOENCODING=utf-8
      - TZ=${TZ:-Asia/Shanghai}
    ports:
      - "${WEB_PORT:-8000}:8000"
    volumes:
      - ./deploy/config/config.yaml:/app/config.yaml:ro
      - ./deploy/data:/app/data
      - ./deploy/logs:/app/logs
      - ./deploy/backups:/app/backups
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  daemon:
    image: paper-agent:latest
    container_name: paper-agent-daemon
    command: paper-agent daemon --config /app/config.yaml
    env_file:
      - .env
    environment:
      - PYTHONIOENCODING=utf-8
      - TZ=${TZ:-Asia/Shanghai}
    volumes:
      - ./deploy/config/config.yaml:/app/config.yaml:ro
      - ./deploy/data:/app/data
      - ./deploy/logs:/app/logs
      - ./deploy/backups:/app/backups
    depends_on:
      web:
        condition: service_healthy
    restart: unless-stopped
