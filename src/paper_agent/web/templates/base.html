<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Paper Agent{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css?v={{ style_version }}">
    <script src="/static/vendor/htmx.min.js"></script>
    <script src="/static/preferences.js?v={{ prefs_version }}" defer></script>
    <script src="/static/app.js?v={{ app_version }}" defer></script>
</head>
<body>
    <header class="site-header">
        <div class="container">
            <h1 class="site-title"><a href="/">Paper Agent</a></h1>
            <p class="site-subtitle">AI Infra 论文浏览器</p>
            <nav class="site-nav">
                <a href="/" class="nav-link">浏览论文</a>
                <a href="/subscribe" class="nav-link">订阅推送</a>
            </nav>
        </div>
    </header>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    <footer class="site-footer">
        <div class="container">
            <p>Powered by <code>paper-agent</code></p>
        </div>
    </footer>
</body>
</html>
