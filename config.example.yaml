# Paper Agent 配置文件
# 复制为 config.yaml 并填入你的实际配置
# 敏感信息可使用 ${ENV_VAR} 从环境变量读取

# ─── arXiv 抓取配置（全局共享） ───
fetch:
  categories:
    - cs.DC     # 分布式计算
    - cs.LG     # 机器学习
    - cs.AI     # 人工智能
    - cs.PF     # 性能
    - cs.NI     # 网络
    - cs.AR     # 硬件架构
  keywords:
    - distributed training
    - model parallelism
    - pipeline parallelism
    - data parallelism
    - tensor parallelism
    - inference optimization
    - model serving
    - GPU scheduling
    - GPU cluster
    - large language model infrastructure
    - mixture of experts
    - speculative decoding
    - KV cache
    - quantization
    - model compression
    - checkpoint
    - all-reduce
    - communication optimization
    - memory optimization
    - deep learning compiler
    - operator fusion
  max_results: 200
  days_back: 2

# ─── LLM 打分配置（全局共享） ───
scoring:
  model: claude-haiku-4-5       # 模型名称（可换成为其他 Anthropic 模型）
  batch_size: 10                 # 每次 API 调用处理的论文数

  # ─── API 连接配置 ───
  # api_key: 留空则使用环境变量 ANTHROPIC_API_KEY（推荐通过 ${ENV_VAR} 引用）
  api_key: ${ANTHROPIC_API_KEY}
  # base_url: 自定义 API 端点（用于代理 / 网关），留空使用 Anthropic 官方端点
  # base_url: https://your-proxy.example.com/v1

  # ─── 生成参数 ───
  max_tokens: 4096               # 每次 API 调用的最大输出 token 数
  # temperature: 0.3             # 留空使用 SDK 默认（不设置该参数）
  tool_choice: auto              # "auto" 或 "tool"（强制使用 score_papers 工具）
  abstract_max_length: 800       # 提交给 LLM 前截断摘要的字符数

  # ─── 评分权重 ───
  # total_score = relevance * relevance_weight + quality * quality_weight
  # 建议两者之和为 1.0，不为 1.0 时会输出警告但仍可使用
  relevance_weight: 0.6          # 相关性权重
  quality_weight: 0.4            # 质量权重

  # ─── Prompt 自定义（可选） ───
  # 留空或未设置时使用内置默认 prompt
  # prompts:
  #   system_prompt: |
  #     你是一个专注于 AI Infrastructure 的审稿人。请对论文的相关性和质量打分 (0-10)。
  #   # 用户消息模板支持 {paper_count} 和 {papers} 两个占位符
  #   user_message_template: |
  #     请对以下 {paper_count} 篇论文打分，并使用 score_papers 工具返回结果。
  #
  #     {papers}

# ─── 全局邮件配置（用于订阅用户） ───
# 通过 Web 表单订阅的用户将使用此 SMTP 配置接收推送邮件
# 如果未配置此项，订阅用户将无法收到邮件（但仍可在 Web 界面浏览论文）
#
# 注意：此配置仅影响通过 Web 表单订阅的用户
# 在 config.yaml 中手动配置的用户可以使用各自的 SMTP 配置
email:
  enabled: false                 # 设为 true 以启用邮件推送功能
  smtp_host: smtp.gmail.com      # SMTP 服务器地址
  smtp_port: 587                 # SMTP 端口（587 for TLS, 465 for SSL）
  smtp_user: ${SMTP_USER}        # SMTP 用户名（通常就是你的邮箱地址）
  smtp_password: ${SMTP_PASSWORD} # SMTP 密码或应用专用密码
  sender: ${SMTP_SENDER}         # 发件人邮箱（通常与 smtp_user 相同）
  use_tls: true                  # 是否使用 TLS 加密

# ─── Web 订阅配置 ───
subscriptions:
  default_top_n: 10              # Web 订阅用户每次最多推送论文数
  send_initial_digest_on_signup: true # 订阅成功后立即为该用户推送一次
  access:
    enabled: false               # 设为 true 后，订阅表单需要访问码
    access_codes: []             # 示例: ["private-code"]；不要提交真实访问码
  unsubscribe:
    secret: ${UNSUBSCRIBE_SECRET} # 用于签名取消订阅链接；生产环境请设置稳定随机值
    token_max_age_hours: 720     # 取消订阅链接有效期（默认 30 天）

# ─── Web 展示配置 ───
web:
  min_quality: 5.0               # Web 列表默认隐藏质量分低于该值的论文；设为 0 或 null 可关闭
  public_base_url: ""            # 外部访问地址，用于生成取消订阅链接，如 https://papers.example.com

# ─── 用户配置 ───
# 每个用户可以订阅不同的子领域，使用不同的通知渠道
#
# 可用的子领域 (sub_domains):
#   quantization        - 量化（PTQ, QAT, INT8, INT4, GPTQ, AWQ）
#   distillation        - 蒸馏（知识蒸馏, teacher-student）
#   pruning             - 剪枝（结构化/非结构化剪枝, lottery ticket）
#   sparsity            - 稀疏（稀疏注意力, 2:4/N:M 稀疏）
#   distributed_training - 分布式训练（数据并行, FSDP, DeepSpeed, ZeRO）
#   parallelism         - 并行策略（张量/流水线/模型并行, Megatron）
#   serving             - 推理服务（vLLM, continuous batching, PagedAttention）
#   speculative_decoding - 投机解码（draft model, speculative inference）
#   kv_cache            - KV Cache 管理（prefix caching, 注意力优化）
#   moe                 - 混合专家模型（MoE, expert routing）
#   compiler            - 深度学习编译器（TVM, XLA, MLIR, FlashAttention）
#   memory_optimization - 内存优化（激活检查点, offloading）
#   communication       - 通信优化（all-reduce, all-gather, NCCL）
#   scheduling          - 调度（GPU 调度, 集群管理）
#
# 使用 ["all"] 订阅所有子领域

users:
  # ─── 示例用户 1: Alice，关注量化和稀疏 ───
  - user_id: alice
    display_name: "Alice"
    subscriptions:
      sub_domains: [quantization, sparsity, pruning]
    notify:
      feishu:
        enabled: true
        webhook_url: ${FEISHU_WEBHOOK_ALICE}
    thresholds:
      min_relevance: 6.0
      min_quality: 5.0
      top_n: 10

  # ─── 示例用户 2: Bob，关注蒸馏和 MoE ───
  - user_id: bob
    display_name: "Bob"
    subscriptions:
      sub_domains: [distillation, moe, serving]
    notify:
      email:
        enabled: true
        smtp_host: smtp.gmail.com
        smtp_port: 587
        smtp_user: ${SMTP_USER}
        smtp_password: ${SMTP_PASSWORD}
        sender: ${SMTP_SENDER}
        recipients:
          - bob@example.com
        use_tls: true
    thresholds:
      min_relevance: 7.0
      min_quality: 6.0
      top_n: 5

  # ─── 示例用户 3: 团队频道，接收所有论文 ───
  - user_id: team_channel
    display_name: "AI Infra Team"
    subscriptions:
      sub_domains: [all]
    notify:
      wecom:
        enabled: true
        webhook_url: ${WECOM_WEBHOOK}
    thresholds:
      min_relevance: 6.0
      min_quality: 5.0
      top_n: 20

# ─── 定时任务配置（全局） ───
schedule:
  enabled: true
  mode: cron                     # cron: 每天固定时间；interval: 按间隔重复运行
  cron_hour: 9                   # mode=cron 时生效
  cron_minute: 0                 # mode=cron 时生效
  interval_minutes: 360          # mode=interval 时生效；频率越高 arXiv/API 压力越大
  timezone: Asia/Shanghai

# ─── 存储配置 ───
storage:
  db_path: paper_agent.db

# ─── 日志配置 ───
logging:
  level: INFO
  file: null    # 设为文件路径以写入日志文件，null 则仅输出到控制台
